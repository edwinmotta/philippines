<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lingo Race - Winner Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;600;700&display=swap');

        :root {
            --blue: #2563eb;
            --yellow: #facc15;
            --red: #dc2626;
            --green: #16a34a;
            --orange: #ea580c;
            --black: #171717;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .heading { font-family: 'Fredoka One', cursive; }

        .board-wrapper {
            position: relative;
            width: 650px;
            height: 650px;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 0 60px rgba(0,0,0,0.6);
            border: 12px solid #334155;
            overflow: hidden;
        }

        /* Tableros */
        .grid-board {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(7, 1fr);
            width: 100%;
            height: 100%;
        }

        .hex-board {
            width: 100%;
            height: 100%;
            position: relative;
            background: #f8fafc;
        }

        .center-hub {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .center-square { width: 92px; height: 92px; border: 4px double #cbd5e1; }
        .center-hex { 
            width: 140px; height: 140px; 
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            border: 4px solid #cbd5e1;
        }

        /* Celdas */
        .cell {
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            background: white;
            position: absolute;
            color: #94a3b8;
        }

        .square-cell { position: relative; width: 100%; height: 100%; }

        .safe-cell { background-color: #f1f5f9; font-weight: bold; border: 2px solid #cbd5e1; }
        .safe-cell::after { content: 'SAFE'; font-size: 7px; color: #94a3b8; }

        /* Tokens */
        .token {
            width: 32px; height: 32px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            cursor: pointer;
            z-index: 50;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: absolute;
        }

        .active-token {
            animation: bounce 0.8s infinite;
            filter: brightness(1.2);
            z-index: 100;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .dice-visual {
            width: 75px; height: 75px;
            background: white;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #1e293b;
            margin: 15px auto;
            box-shadow: 0 8px 0 #94a3b8;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .dice-visual:active { transform: translateY(4px); box-shadow: 0 4px 0 #94a3b8; }

        .rolling { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
            100% { transform: rotate(-10deg); }
        }

        .prison-box { position: relative; border: 4px solid rgba(255,255,255,0.2); }
        .prison-circle { width: 80px; height: 80px; border-radius: 50%; border: 4px dashed rgba(255,255,255,0.3); position: absolute; }

        .color-blue { background-color: var(--blue); }
        .color-yellow { background-color: var(--yellow); }
        .color-red { background-color: var(--red); }
        .color-green { background-color: var(--green); }
        .color-orange { background-color: var(--orange); }
        .color-black { background-color: var(--black); }

        .modal-bg { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); }

        /* Victory Overlay */
        #victory-screen {
            background: rgba(15, 23, 42, 0.98);
            display: none;
            position: fixed;
            inset: 0;
            z-index: 500;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Pantalla Inicial -->
    <div id="setup" class="max-w-xl bg-slate-900 p-12 rounded-[40px] shadow-2xl text-center border-4 border-slate-800">
        <h1 class="heading text-7xl text-blue-500 mb-4">Lingo Race</h1>
        <p class="text-slate-400 mb-12 font-bold tracking-widest uppercase italic">Colombian Style • English Practice</p>
        
        <div class="grid grid-cols-2 gap-6">
            <button onclick="startGame(3)" class="bg-blue-600 p-6 rounded-3xl font-bold hover:bg-blue-500 transition-all hover:scale-105 shadow-xl">3 Players<br><span class="text-xs opacity-70">Cross Board</span></button>
            <button onclick="startGame(4)" class="bg-emerald-600 p-6 rounded-3xl font-bold hover:bg-emerald-500 transition-all hover:scale-105 shadow-xl">4 Players<br><span class="text-xs opacity-70">Cross Board</span></button>
            <button onclick="startGame(5)" class="bg-orange-600 p-6 rounded-3xl font-bold hover:bg-orange-500 transition-all hover:scale-105 shadow-xl">5 Players<br><span class="text-xs opacity-70">Hexagonal Board</span></button>
            <button onclick="startGame(6)" class="bg-zinc-700 p-6 rounded-3xl font-bold hover:bg-zinc-600 transition-all hover:scale-105 shadow-xl">6 Players<br><span class="text-xs opacity-70">Hexagonal Board</span></button>
        </div>
    </div>

    <!-- Área de Juego -->
    <div id="game-container" class="hidden flex flex-col lg:flex-row items-center gap-12 p-6">
        
        <div id="board-container" class="board-wrapper">
            <!-- Inyección dinámica -->
        </div>

        <div class="w-80 space-y-6">
            <div class="bg-slate-900 p-8 rounded-[35px] border-b-8 border-blue-600 shadow-2xl text-center">
                <p id="player-turn-name" class="heading text-2xl mb-2 uppercase">Blue's Turn</p>
                <div id="dice" class="dice-visual" onclick="rollDice()">?</div>
                <div id="dice-result" class="mt-4 text-yellow-400 font-bold text-xl h-8"></div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-xl">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Players Distance</h3>
                <div id="player-stats" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <!-- Modal de Desafío -->
    <div id="modal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-6 modal-bg">
        <div class="bg-white max-w-2xl w-full rounded-[50px] shadow-2xl overflow-hidden text-slate-800">
            <div id="modal-accent" class="h-6 bg-blue-600"></div>
            <div class="p-12 text-center">
                <h2 class="heading text-4xl mb-4" id="modal-title">Challenge!</h2>
                <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-8">Discuss the following statement:</p>
                <div id="modal-content" class="text-2xl font-bold italic mb-12 leading-relaxed text-slate-700 px-4"></div>
                
                <div id="standard-ui" class="space-y-4">
                    <button onclick="resolveChallenge(true)" class="w-full bg-emerald-500 text-white font-bold py-6 rounded-2xl shadow-xl hover:bg-emerald-600 transition-all text-lg">Goal achieved!</button>
                    <button onclick="resolveChallenge(false)" class="w-full bg-slate-100 text-slate-400 font-bold py-4 rounded-2xl">Need more practice</button>
                </div>

                <div id="debate-ui" class="hidden">
                    <div class="grid grid-cols-2 gap-6 mb-10">
                        <div class="bg-emerald-50 p-6 rounded-3xl border-2 border-emerald-200">
                            <p class="text-xs font-black text-emerald-600 uppercase mb-2">Attacker</p>
                            <p class="font-bold text-emerald-900">AGREE</p>
                        </div>
                        <div class="bg-rose-50 p-6 rounded-3xl border-2 border-rose-200">
                            <p class="text-xs font-black text-rose-600 uppercase mb-2">Defender</p>
                            <p class="font-bold text-rose-900">DISAGREE</p>
                        </div>
                    </div>
                    <button onclick="resolveChallenge(true)" class="w-full bg-blue-600 text-white font-bold py-6 rounded-2xl shadow-xl text-lg">Both participants succeeded!</button>
                    <button onclick="resolveChallenge(false)" class="w-full mt-4 text-slate-300 font-bold">Someone failed</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Pantalla de Victoria -->
    <div id="victory-screen">
        <h2 class="heading text-8xl text-yellow-400 mb-6 drop-shadow-2xl">WINNER!</h2>
        <div id="winner-token-visual" class="w-24 h-24 rounded-full border-8 border-white mb-6 shadow-2xl"></div>
        <p id="winner-name" class="heading text-5xl text-white mb-10 uppercase tracking-widest"></p>
        <p class="text-slate-400 font-bold mb-12">Congratulations! You completed the Lingo Race.</p>
        <button onclick="location.reload()" class="bg-blue-600 text-white font-bold px-12 py-6 rounded-full hover:bg-blue-500 transition-all transform hover:scale-110 text-2xl shadow-2xl">Play Again</button>
        <div class="absolute inset-0 pointer-events-none flex items-center justify-center text-6xl opacity-30 select-none">
            🥳 🎉 🏆 🥂 ✨ 🎊 🎈 🥇
        </div>
    </div>

    <script>
        const FULL_STATEMENTS = [
            "Children shouldn't have access to phones",
            "The use of AI in written documents causes people to lose critical thinking skills.",
            "The customer is always right",
            "Adults can't learn english",
            "Why do you think children learn a new language so easly?",
            "Nowadays people are lazier than 10 years ago",
            "One should always translate from spanish to english in order to speak english better",
            "Call center agents must listen carefully to what the customer is saying over the phone in order to avoid misunderstandings",
            "It is impossible to think in english",
            "Why is education important?",
            "How should I provide opinions?",
            "Remote work makes employees less productive",
            "Learning grammar rules is more important than practicing speaking",
            "Technology is making communication less personal",
            "English should be taught only in English, not using the native language",
            "Why is it difficult for some people to speak in public?",
            "People remember more when they write by hand than when they type",
            "Empathy is more important than technical accuracy in customer service",
            "Customers become more aggressive when agents speak with a strong accent",
            "Why is active listening essential in customer service?",
            "Using simple English is more effective than using advanced vocabulary with customers",
            "Why do some students understand English but cannot speak it?",
            "Students learn better through real-life scenarios than through textbooks",
            "Feedback should focus more on communication than on errors",
            "Writing helps reinforce speaking skills",
            "Confidence is more important than knowledge when speaking a new language",
            "Grammar should be taught explicitly before speaking practice",
            "Listening skills develop faster than speaking skills",
            "Why do learners translate in their heads instead of thinking in English?",
            "Adults can achieve native-like pronunciation with enough practice",
            "Teachers should correct every mistake students make"
        ];

        const PLAYERS_DATA = [
            { name: 'Blue', color: '#2563eb', class: 'color-blue', startIdx: 0 },
            { name: 'Yellow', color: '#eab308', class: 'color-yellow', startIdx: 8 },
            { name: 'Red', color: '#dc2626', class: 'color-red', startIdx: 16 },
            { name: 'Green', color: '#16a34a', class: 'color-green', startIdx: 24 },
            { name: 'Orange', color: '#ea580c', class: 'color-orange', startIdx: 32 },
            { name: 'Black', color: '#171717', class: 'color-black', startIdx: 40 }
        ];

        let numPlayers = 4;
        let currentPlayer = 0;
        let players = [];
        let cells = [];
        let isRolling = false;
        let activeChallenge = null;
        let gameOver = false;

        function startGame(n) {
            numPlayers = n;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            
            if (numPlayers <= 4) buildSquareBoard();
            else buildHexBoard();
            
            initPlayers();
            updateUI();
        }

        function buildSquareBoard() {
            const container = document.getElementById('board-container');
            container.innerHTML = '<div id="board" class="grid-board"></div>';
            const board = document.getElementById('board');
            
            const goal = document.createElement('div');
            goal.className = 'center-hub center-square heading text-center text-xs text-slate-400';
            goal.style.gridArea = '4 / 4 / 5 / 5';
            goal.innerHTML = "LINGO<br>FINISH";
            board.appendChild(goal);

            const prisons = [
                {area: '1/1/3/3', class: 'color-blue'}, {area: '1/6/3/8', class: 'color-yellow'},
                {area: '6/6/8/8', class: 'color-red'}, {area: '6/1/8/3', class: 'color-green'}
            ];
            prisons.forEach((p, i) => {
                const pr = document.createElement('div');
                pr.className = `prison-box ${p.class} rounded-xl`;
                pr.style.gridArea = p.area;
                board.appendChild(pr);
            });

            // CLOCKWISE PATH
            const pathCoords = [
                {r:1,c:3},{r:1,c:4},{r:1,c:5},{r:2,c:5},{r:3,c:5},{r:3,c:6},{r:3,c:7},{r:4,c:7},
                {r:5,c:7},{r:5,c:6},{r:5,c:5},{r:6,c:5},{r:7,c:5},{r:7,c:4},{r:7,c:3},{r:6,c:3},
                {r:5,c:3},{r:5,c:2},{r:5,c:1},{r:4,c:1},{r:3,c:1},{r:3,c:2},{r:3,c:3},{r:2,c:3}
            ];

            pathCoords.forEach((coord, i) => {
                const c = document.createElement('div');
                c.className = 'cell square-cell';
                if (i % 6 === 0) c.classList.add('safe-cell');
                c.style.gridRow = coord.r;
                c.style.gridColumn = coord.c;
                board.appendChild(c);
                cells.push({ el: c, r: coord.r, c: coord.c });
            });
        }

        function buildHexBoard() {
            const container = document.getElementById('board-container');
            container.innerHTML = '<div id="board" class="hex-board"></div>';
            const board = document.getElementById('board');
            const center = document.createElement('div');
            center.className = 'center-hub center-hex heading text-slate-300 text-sm';
            center.innerHTML = "LINGO<br>HEX";
            board.appendChild(center);
            const centerX = 325, centerY = 325, radius = 240;
            for (let i = 0; i < 48; i++) {
                const angle = (i / 48) * Math.PI * 2 - Math.PI/2;
                const x = centerX + radius * Math.cos(angle) - 20;
                const y = centerY + radius * Math.sin(angle) - 20;
                const c = document.createElement('div');
                c.className = 'cell';
                c.style.width = '42px'; c.style.height = '42px';
                c.style.left = `${x}px`; c.style.top = `${y}px`;
                if (i % 8 === 0) c.classList.add('safe-cell');
                board.appendChild(c);
                cells.push({ el: c, x, y });
            }
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2 - Math.PI/2;
                const x = centerX + 155 * Math.cos(angle) - 40;
                const y = centerY + 155 * Math.sin(angle) - 40;
                const pr = document.createElement('div');
                pr.className = `prison-circle ${PLAYERS_DATA[i].class}`;
                pr.style.left = `${x}px`; pr.style.top = `${y}px`;
                board.appendChild(pr);
            }
        }

        function initPlayers() {
            const stats = document.getElementById('player-stats');
            for (let i = 0; i < numPlayers; i++) {
                const data = PLAYERS_DATA[i];
                const p = {
                    ...data,
                    pos: data.startIdx % cells.length,
                    distance: 0 // Track total steps moved
                };
                players.push(p);
                const t = document.createElement('div');
                t.id = `token-${i}`;
                t.className = `token ${p.class}`;
                document.getElementById('board').appendChild(t);
                const item = document.createElement('div');
                item.className = "flex justify-between items-center text-sm p-3 rounded-2xl bg-slate-50";
                item.innerHTML = `<span class="font-bold text-slate-700" style="color:${p.color}">${p.name}</span> <span id="p-dist-${i}" class="font-black text-slate-400">0%</span>`;
                stats.appendChild(item);
            }
            renderTokens();
        }

        function rollDice() {
            if (isRolling || activeChallenge || gameOver) return;
            isRolling = true;
            const dice = document.getElementById('dice');
            const res = document.getElementById('dice-result');
            dice.classList.add('rolling');
            res.innerText = "Rolling...";
            const val = Math.floor(Math.random() * 6) + 1;
            setTimeout(() => {
                dice.classList.remove('rolling');
                dice.innerText = val;
                res.innerText = `Rolled a ${val}!`;
                setTimeout(() => { movePlayer(val); }, 1000);
            }, 800);
        }

        function movePlayer(steps) {
            const p = players[currentPlayer];
            p.distance += steps;
            p.pos = (p.pos + steps) % cells.length;
            
            renderTokens();

            // Check for Victory
            if (p.distance >= cells.length) {
                showVictory(p);
                return;
            }

            let collidedIdx = -1;
            players.forEach((other, idx) => {
                if (idx !== currentPlayer && other.pos === p.pos) collidedIdx = idx;
            });

            if (collidedIdx !== -1) openChallenge('debate', collidedIdx);
            else openChallenge('normal');
        }

        function renderTokens() {
            players.forEach((p, i) => {
                const t = document.getElementById(`token-${i}`);
                const cell = cells[p.pos];
                if (numPlayers <= 4) {
                    t.style.left = `${cell.el.offsetLeft + 8 + (i*1.5)}px`;
                    t.style.top = `${cell.el.offsetTop + 8 + (i*1.5)}px`;
                } else {
                    t.style.left = `${cell.x + 5 + (i*1)}px`;
                    t.style.top = `${cell.y + 5 + (i*1)}px`;
                }
                if (i === currentPlayer) t.classList.add('active-token');
                else t.classList.remove('active-token');
                
                // Update Progress %
                const progress = Math.min(100, Math.round((p.distance / cells.length) * 100));
                document.getElementById(`p-dist-${i}`).innerText = `${progress}%`;
            });
        }

        function openChallenge(type, targetIdx = null) {
            activeChallenge = { type, targetIdx };
            const topic = FULL_STATEMENTS[Math.floor(Math.random() * FULL_STATEMENTS.length)];
            const p = players[currentPlayer];
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-accent').style.backgroundColor = p.color;
            document.getElementById('modal-content').innerText = `"${topic}"`;
            if (type === 'debate') {
                document.getElementById('modal-title').innerText = "Debate Duel!";
                document.getElementById('standard-ui').classList.add('hidden');
                document.getElementById('debate-ui').classList.remove('hidden');
            } else {
                document.getElementById('modal-title').innerText = `${p.name}'s Opinion`;
                document.getElementById('standard-ui').classList.remove('hidden');
                document.getElementById('debate-ui').classList.add('hidden');
            }
        }

        function resolveChallenge(success) {
            document.getElementById('modal').classList.add('hidden');
            const p = players[currentPlayer];
            if (activeChallenge.type === 'normal') {
                if (!success) {
                    const retreat = Math.floor(Math.random() * 3) + 1;
                    p.pos = (p.pos - retreat + cells.length) % cells.length;
                    p.distance = Math.max(0, p.distance - retreat);
                }
            } else {
                if (success) {
                    const victim = players[activeChallenge.targetIdx];
                    victim.pos = (victim.pos - 5 + cells.length) % cells.length;
                    victim.distance = Math.max(0, victim.distance - 5);
                } else {
                    const retreat = 4;
                    p.pos = (p.pos - retreat + cells.length) % cells.length;
                    p.distance = Math.max(0, p.distance - retreat);
                    const v = players[activeChallenge.targetIdx];
                    v.pos = (v.pos - retreat + cells.length) % cells.length;
                    v.distance = Math.max(0, v.distance - retreat);
                }
            }
            renderTokens();
            isRolling = false;
            activeChallenge = null;
            nextTurn();
        }

        function nextTurn() {
            currentPlayer = (currentPlayer + 1) % numPlayers;
            updateUI();
        }

        function updateUI() {
            const p = players[currentPlayer];
            const label = document.getElementById('player-turn-name');
            label.innerText = `${p.name}'s Turn`;
            label.style.color = p.color;
            document.getElementById('dice').innerText = "?";
            document.getElementById('dice-result').innerText = "";
        }

        function showVictory(player) {
            gameOver = true;
            const screen = document.getElementById('victory-screen');
            const nameEl = document.getElementById('winner-name');
            const tokenEl = document.getElementById('winner-token-visual');
            
            nameEl.innerText = `${player.name} WINS!`;
            tokenEl.style.backgroundColor = player.color;
            screen.style.display = 'flex';
        }
    </script>
</body>
</html>
